services:

  redis:
    image: redis:7
    container_name: redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app_network

  auth_service:
    build:
      context: ./backend
      dockerfile: Dockerfile.auth
    container_name: auth_service
    ports:
      - "8001:8001"
    networks:
      - app_network

  animal_service:
    build:
      context: ./backend
      dockerfile: Dockerfile.animal
    container_name: animal_service
    ports:
      - "8002:8002"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app_network

  adoption_service:
    build:
      context: ./backend
      dockerfile: Dockerfile.adoption
    container_name: adoption_service
    ports:
      - "8003:8003"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app_network

  api_gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile.gateway
    container_name: api_gateway
    ports:
      - "8000:8000"
    depends_on:
      - auth_service
      - animal_service
      - adoption_service
    networks:
      - app_network

networks:
  app_network:
    driver: bridge
